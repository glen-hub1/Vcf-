<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Contact System</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#141E30,#243B55);
margin:0;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
color:black;
padding:30px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:30px;
background:#243B55;
color:white;
cursor:pointer;
}

.counter{
background:#f3f3f3;
padding:15px;
border-radius:15px;
margin:15px 0;
}

.download{
display:none;
background:#28a745;
}

.admin-btn{
background:#000;
margin-top:15px;
}

.dashboard{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
color:black;
padding:20px;
overflow:auto;
}

.card{
background:#f3f3f3;
padding:15px;
margin:10px 0;
border-radius:10px;
}

</style></head>
<body><div class="container"><h2>VIP Contact List</h2>
<p>Limited to 700 Members</p><div class="counter">
Registered: <strong id="registered">0</strong><br>
Remaining: <strong id="remaining">700</strong>
</div><input type="text" id="name" placeholder="Your Name">
<input type="tel" id="phone" placeholder="Phone Number"><button onclick="registerUser()">Register</button>

<button id="downloadBtn" class="download" onclick="downloadVCF()">
Download VCF
</button><br><a id="groupLink" target="_blank">Join WhatsApp Group</a>

<button class="admin-btn" onclick="openAdmin()">
Admin Login
</button></div><!-- Admin Dashboard --><div class="dashboard" id="dashboard"><h2>Admin Dashboard</h2><button onclick="closeAdmin()">Close</button>

<div class="counter">
Total Registered: <strong id="adminTotal">0</strong>
</div><button onclick="exportContacts()">
Export Contacts
</button><button onclick="resetAll()">
Reset System
</button><div id="contactList"></div></div><script>

const MAX = 700;
const PASSWORD = "admin123";

let contacts = JSON.parse(localStorage.getItem("contacts")) || [];

function updateUI(){

let registered = contacts.length;

document.getElementById("registered").innerText = registered;
document.getElementById("remaining").innerText = MAX - registered;
document.getElementById("adminTotal").innerText = registered;

renderContacts();

if(registered >= MAX){
document.querySelector("button").disabled = true;
}

}

function registerUser(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(!name || !phone){
alert("Fill all fields");
return;
}

if(contacts.length >= MAX){
alert("VCF FULL");
return;
}

contacts.push({name,phone});

localStorage.setItem("contacts",JSON.stringify(contacts));

updateUI();

document.getElementById("downloadBtn").style.display="block";

}

function renderContacts(){

let html = "";

contacts.forEach((c,i)=>{
html += `
<div class="card">
${i+1}. ${c.name} - ${c.phone}
</div>
`;
});

document.getElementById("contactList").innerHTML = html;

}

function openAdmin(){

let pass = prompt("Enter Admin Password");

if(pass === PASSWORD){
document.getElementById("dashboard").style.display="block";
}

}

function closeAdmin(){
document.getElementById("dashboard").style.display="none";
}

function exportContacts(){

let text = "";

contacts.forEach(c=>{
text += `${c.name}, ${c.phone}\n`;
});

let blob = new Blob([text]);
let a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = "contacts.txt";
a.click();

}

function resetAll(){

if(confirm("Reset All Contacts?")){
localStorage.removeItem("contacts");
contacts = [];
updateUI();
}

}

function downloadVCF(){
window.location.href="contact.vcf";
}

// EDIT GROUP LINK HERE

document.getElementById("groupLink").href = "https://chat.whatsapp.com/Cm8Vi7nQMplG4KpvlTsE2u?mode=gi_t";

updateUI();

</script></body>
</html>
